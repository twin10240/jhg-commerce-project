# 로컬 기본은 8080, Railway 등 PaaS는 주입되는 ${PORT}에 바인딩한다.
server:
  port: ${PORT:8080}

spring:
  datasource:
#    url: jdbc:h2:~/hgpage
    url: jdbc:h2:tcp://localhost/~/hgpage
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      # 기본: 데이터 보존(update). 스키마를 갈아엎고 다시 시드하려면 local 프로파일로 실행:
      #   .\gradlew.bat bootRun --args='--spring.profiles.active=local'
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        default_batch_fetch_size: 100

  # H2 환경(로컬/개발)에서는 Flyway 비활성 — H2 드라이버 모듈 없음 + ddl-auto로 스키마 관리
  flyway:
    enabled: false

  logging:
    level:
      org.hibernate.SQL: debug
      org.hibernate.type.descriptor.sql.BasicBinder: trace

wms:
  base-url: http://localhost:8081

---
# 리셋용 프로파일: 스키마 DROP & 재생성 (시드는 initDb가 빈 DB를 감지해 자동 실행)
spring:
  config:
    activate:
      on-profile: local
  jpa:
    hibernate:
      ddl-auto: create

---
# 운영 프로파일(Railway): PostgreSQL + Flyway
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # Flyway가 스키마를 관리한다. Hibernate는 검증만 수행.
      ddl-auto: validate
    properties:
      hibernate:
        show_sql: false
        format_sql: false
        default_batch_fetch_size: 100
  flyway:
    enabled: true
    locations: classpath:db/migration
    repair-on-migrate: true
decorator:
  datasource:
    p6spy:
      enable-logging: false
