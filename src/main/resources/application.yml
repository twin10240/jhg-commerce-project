# 로컬 기본은 8080, Railway 등 PaaS는 주입되는 ${PORT}에 바인딩한다.
server:
  port: ${PORT:8080}

spring:
  datasource:
#    url: jdbc:h2:~/hgpage
    url: jdbc:h2:tcp://localhost/~/hgpage
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      # 기본: 데이터 보존(update). 스키마를 갈아엎고 다시 시드하려면 local 프로파일로 실행:
      #   .\gradlew.bat bootRun --args='--spring.profiles.active=local'
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        default_batch_fetch_size: 100

  logging:
    level:
      org.hibernate.SQL: debug
      org.hibernate.type.descriptor.sql.BasicBinder: trace

---
# 리셋용 프로파일: 스키마 DROP & 재생성 (시드는 initDb가 빈 DB를 감지해 자동 실행)
spring:
  config:
    activate:
      on-profile: local
  jpa:
    hibernate:
      ddl-auto: create

---
# 운영 프로파일(Railway): PostgreSQL. SPRING_PROFILES_ACTIVE=prod 로 활성화.
# DB 접속 정보는 Railway PostgreSQL 플러그인이 주입하는 환경변수를 참조한다(저장소에 비밀정보 없음).
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # 첫 배포 시 Hibernate가 스키마 생성 → initDb가 빈 DB 감지해 시드. 운영 안정화 후 Flyway 도입 검토.
      ddl-auto: update
    properties:
      hibernate:
        show_sql: false
        format_sql: false
        default_batch_fetch_size: 100
# 운영에선 p6spy SQL 로깅을 끈다(성능·로그량).
decorator:
  datasource:
    p6spy:
      enable-logging: false
