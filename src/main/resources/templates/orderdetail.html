<!-- templates/orderdetail.html : 구매 상세(체크아웃) -->
<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>구매 상세</title>

  <style>
    :root{
      --bg1:#fff7ed; --bg2:#fde7d8; --bg3:#fae8ff;
      --card:#fffaf5; --ink:#443c33; --muted:#7a6f66;
      --accent1:#f4a261; --accent2:#e76f51;
      --ring:rgba(244,162,97,.35);
      --radius:18px; --shadow:0 20px 45px rgba(68,60,51,.18);
    }
    *{box-sizing:border-box}
    html{height:100%}
    /* height:100%로 고정하면 스크롤 영역에서 배경이 반복되며 끊기므로 min-height 사용 */
    body{
      min-height:100%;
      margin:0; color:var(--ink);
      font-family:ui-sans-serif, system-ui, -apple-system,"Segoe UI",Roboto,"Noto Sans KR",Arial,"Apple SD Gothic Neo";
      background:
              radial-gradient(1200px 700px at 80% 10%, var(--bg3) 0%, transparent 60%),
              radial-gradient(900px 600px at 10% 90%, var(--bg2) 0%, transparent 60%),
              linear-gradient(180deg, var(--bg1), #fff);
      background-repeat:no-repeat;
      padding:24px;
    }
    .container{max-width:1080px; margin:0 auto}

    .page-title{font-size:24px; font-weight:800; letter-spacing:-.2px}
    .page-desc{color:var(--muted); font-size:13px; margin-top:4px}

    .card{
      background:var(--card); border-radius:var(--radius);
      box-shadow:var(--shadow); padding:20px 18px; position:relative; overflow:hidden;
      animation:fade .3s ease;
    }
    @keyframes fade{from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:translateY(0)}}

    /* 2단 레이아웃: 좌측 주문 흐름 + 우측 sticky 결제 요약 */
    .layout{
      display:grid; grid-template-columns:minmax(0,1fr) 340px;
      gap:20px; align-items:start; margin-top:16px;
    }
    .main-col{display:grid; gap:16px}
    .sidebar{position:sticky; top:24px; display:grid; gap:16px}

    /* 공통 UI */
    .btn{
      appearance:none; border:0; cursor:pointer;
      padding:12px 14px; border-radius:12px; color:white; font-weight:700;
      background:linear-gradient(135deg, var(--accent1), var(--accent2));
      box-shadow:0 10px 20px rgba(231,111,81,.3), 0 2px 6px rgba(0,0,0,.06);
      transition:transform .05s ease, filter .2s ease;
      text-decoration:none; font-size:14px;
    }
    .btn:hover{filter:saturate(1.05) brightness(1.02)}
    .btn:active{transform:translateY(1px)}
    .btn.outline{background:#fff; color:#6e6259; border:1px solid #eadfd6; box-shadow:none}
    .btn.block{display:block; text-align:center; width:100%}

    .input, .select, select, .textarea{
      width:100%; padding:12px 14px; border-radius:14px; border:1px solid #eadfd6; background:#fff;
      color:var(--ink); outline:none; transition:border-color .15s;
    }
    .input:focus, .select:focus, select:focus, .textarea:focus{border-color:#f1c7a1; box-shadow:0 0 0 6px var(--ring)}
    .input:disabled{background:#f6f0ea; color:var(--muted)}

    .hint{color:var(--muted); font-size:12px}
    .note{color:var(--muted); font-size:12px}
    .field-error{display:block; margin-top:4px; color:#e5484d; font-size:12px}

    /* 카드 섹션 제목 + 내용 */
    .header{font-weight:800; margin-bottom:12px}
    .content{display:grid; gap:12px}

    /* 폼 필드: 라벨 + 입력 세로 묶음 */
    .field{display:grid; gap:6px}
    .label{font-size:13px; font-weight:700; color:var(--muted)}
    .form-row{display:grid; gap:12px}
    .form-row.cols-3{grid-template-columns:repeat(3, minmax(0,1fr))}     /* 주문자: 3등분 */
    .form-row.addr{grid-template-columns:minmax(0,1fr) minmax(0,1.5fr) 120px} /* 배송지: 도로명을 가장 넓게 */
    .check{display:flex; align-items:center; gap:8px; font-size:14px}

    /* 주문 상품 표 */
    .table{width:100%; border-collapse:separate; border-spacing:0 8px}
    th,td{padding:10px 12px; text-align:left; font-size:14px}
    thead th{color:#7a6f66; font-weight:700}
    tbody tr{background:var(--card); border:1px solid #eadfd6; border-radius:12px}
    tbody tr td:first-child{border-top-left-radius:12px; border-bottom-left-radius:12px}
    tbody tr td:last-child{border-top-right-radius:12px; border-bottom-right-radius:12px}
    .right{text-align:right}
    .qty-input{max-width:96px; margin-left:auto; text-align:right}
    .select-input{width:18px; height:18px; accent-color:var(--accent2); cursor:pointer}
    tr.unselected{opacity:.45}

    .chip{
      display:inline-flex; align-items:center; gap:6px;
      border:1px solid #eadfd6; border-radius:999px;
      background:#fff; color:#6e6259; padding:6px 10px; font-weight:800; font-size:12px;
    }
    .summary-toolbar{
      display:flex; align-items:center; justify-content:space-between;
      gap:12px; flex-wrap:wrap; padding:2px 0 4px;
    }
    .summary-toolbar .hint{display:flex; align-items:center; gap:8px}
    .img{
      width:40px; height:40px; border-radius:10px; flex:none;
      background:#f7efe7; border:1px solid #eadfd6;
    }

    /* 결제 금액 요약 */
    .sum{display:grid; gap:10px}
    .line{display:flex; justify-content:space-between; align-items:center; gap:16px}
    .line.total{
      margin-top:4px; padding-top:12px; border-top:1px dashed #eadfd6;
      font-size:18px;
    }

    @media (max-width:980px){
      .layout{grid-template-columns:1fr}
      .sidebar{position:static}
    }
    @media (max-width:640px){
      .form-row.cols-3, .form-row.addr{grid-template-columns:1fr}
    }

    /* 다크 모드 보완 */
    @media (prefers-color-scheme: dark){
      body{background:linear-gradient(180deg,#1b1917,#26211d)}
      .card{background:#201d1a; color:#f1eee9}
      .input, .select, select, .textarea{background:#161412; border-color:#39322c; color:#f1eee9}
      .input:disabled{background:#26211d; color:#bfb4a9}
      .btn.outline{background:#161412; border-color:#39322c; color:#d9d4cf}
      .chip{background:#161412; border-color:#39322c; color:#d9d4cf}
      thead th{color:#bfb4a9}
      tbody tr{background:#161412; border-color:#39322c}
      .img{background:#26211d; border-color:#39322c}
    }
  </style>
</head>
<body>
<div class="container">
  <div class="page-title">구매 상세</div>
  <div class="page-desc">회원정보·배송지·결제수단을 확인한 뒤 주문을 완료하세요.</div>

  <!-- 하나의 폼에서 회원/배송/주문/결제 모두 전송 -->
  <form th:action="@{/orders/checkout}" th:object="${checkout}" method="post">
    <!-- CSRF -->
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <!-- 장바구니발 주문 여부: 주문 확정 시 장바구니 정리에 사용 -->
    <input type="hidden" th:field="*{fromCart}"/>

    <div class="layout">
      <!-- 좌측: 주문 정보 흐름 -->
      <div class="main-col">
        <!-- 1) 주문자 정보 -->
        <section class="card">
          <div class="header">주문자 정보</div>
          <div class="content">
            <div class="form-row cols-3">
              <div class="field">
                <label class="label">이름</label>
                <input class="input" th:field="*{member.name}" placeholder="이름" disabled/>
              </div>
              <div class="field">
                <label class="label">이메일</label>
                <input class="input" th:field="*{member.email}" placeholder="you@example.com" disabled/>
              </div>
              <div class="field">
                <label class="label">연락처</label>
                <input class="input" th:field="*{member.phone}" placeholder="010-0000-0000" />
              </div>
            </div>
          </div>
        </section>

        <!-- 2) 배송지 -->
        <section class="card">
          <div class="header">배송지</div>
          <div class="content">
            <div class="form-row addr">
              <div class="field">
                <label class="label">도시 (City)</label>
                <input class="input" th:field="*{delivery.city}" placeholder="예) 서울특별시" />
                <small class="field-error" th:errors="*{delivery.city}"></small>
              </div>
              <div class="field">
                <label class="label">도로명 주소 (Street)</label>
                <input class="input" th:field="*{delivery.street}" placeholder="예) 테헤란로 123" />
                <small class="field-error" th:errors="*{delivery.street}"></small>
              </div>
              <div class="field">
                <label class="label">우편번호 (Zipcode)</label>
                <input class="input" th:field="*{delivery.zipcode}" placeholder="예) 06234" />
                <small class="field-error" th:errors="*{delivery.zipcode}"></small>
              </div>
            </div>

            <label class="check">
              <input type="checkbox" th:field="*{delivery.saveAsDefault}"/>
              기본 배송지로 저장
            </label>
          </div>
        </section>

        <!-- 3) 주문 상품 목록 (단건/다건 모두 지원) -->
        <section class="card">
          <div class="header">주문 상품</div>
          <div class="content">
            <div class="summary-toolbar">
              <div class="hint">
                <span class="chip">주문 상품</span>
                총 <b id="productCount" th:text="${checkout.productCount}">0</b>개
              </div>
              <a class="btn outline" th:href="@{/cart}">장바구니로 이동</a>
            </div>

            <small class="field-error" th:if="${#fields.hasErrors('product')}" th:errors="*{product}"></small>

            <table class="table">
              <thead>
              <tr>
                <th style="width:36px"><input class="select-input" type="checkbox" id="selectAll" checked title="전체 선택/해제"/></th>
                <th>상품</th>
                <th class="right">가격</th>
                <th class="right">수량</th>
                <th class="right">합계</th>
              </tr>
              </thead>
              <tbody>
              <tr th:each="p, pStat : ${checkout.product}" th:attr="data-unit-price=${p.price}">
                <!-- 전송용 숨김필드(아이디/수량) -->
                <input type="hidden" th:field="*{product[__${pStat.index}__].id}"/>
                <td>
                  <input class="select-input" type="checkbox" th:field="*{product[__${pStat.index}__].selected}"/>
                </td>
                <td>
                  <div style="display:flex; align-items:center; gap:12px">
                    <img class="img" alt=""/>
                    <div style="font-weight:600" th:text="${p.name}">상품명</div>
                  </div>
                </td>
                <td class="right">
                  <span class="unit-price" th:text="${#numbers.formatInteger(p.price,3,'COMMA')}">0</span>원
                </td>
                <td class="right">
                  <input class="input qty-input" type="number" min="1" th:field="*{product[__${pStat.index}__].quantity}"/>
                  <small class="field-error" th:errors="*{product[__${pStat.index}__].quantity}"></small>
                </td>
                <td class="right">
                  <span class="line-total" th:text="${#numbers.formatInteger(p.price * p.quantity,3,'COMMA')}">0</span>원
                </td>
              </tr>
              </tbody>
            </table>

            <div class="note">수량을 변경하면 합계가 다시 계산됩니다.</div>
          </div>
        </section>
      </div>

      <!-- 우측: 결제 요약 (스크롤 따라옴) -->
      <aside class="sidebar">
        <!-- 합계 -->
        <section class="card">
          <div class="header">결제 금액</div>
          <div class="content sum">
            <div class="line"><span>상품 합계</span><b><span id="productSubtotal" th:text="${#numbers.formatInteger(checkout.productTotalPrice,3,'COMMA')}">0</span>원</b></div>
            <div class="line"><span>배송비</span><b><span id="deliveryFee">0</span>원</b></div>
            <div class="line"><span>할인 합계</span><b>-<span id="discountTotal">0</span>원</b></div>
            <div class="line total"><span>총 결제금액</span><b><span id="paymentTotal" th:text="${#numbers.formatInteger(checkout.productTotalPrice,3,'COMMA')}">0</span>원</b></div>
          </div>
        </section>

        <!-- 결제수단 -->
        <section class="card">
          <div class="header">결제 수단</div>
          <div class="content">
            <label class="check"><input type="radio" name="paymentMethod" value="CARD" checked/> 신용/체크카드</label>
            <label class="check"><input type="radio" name="paymentMethod" value="VBANK"/> 무통장입금(가상계좌)</label>
            <label class="check"><input type="radio" name="paymentMethod" value="EASY"/> 간편결제(페이)</label>
            <div class="note">결제 단계에서 PG 창이 열립니다.</div>
          </div>
        </section>

        <!-- 약관 + 액션 -->
        <section class="card">
          <div class="content">
            <label class="check" style="align-items:flex-start">
              <input type="checkbox" required/>
              <span>구매 조건 및 개인정보 제3자 제공에 동의합니다.</span>
            </label>
            <button type="submit" class="btn block">주문하기</button>
            <a class="btn outline block" th:href="@{/main}">계속 쇼핑하기</a>
          </div>
        </section>
      </aside>
    </div>
  </form>
</div>

<script>
  (function(){
    const fmt = new Intl.NumberFormat('ko-KR');
    const rows = Array.from(document.querySelectorAll('tbody tr[data-unit-price]'));
    const subtotalEl = document.getElementById('productSubtotal');
    const deliveryEl = document.getElementById('deliveryFee');
    const discountEl = document.getElementById('discountTotal');
    const totalEl = document.getElementById('paymentTotal');
    const countEl = document.getElementById('productCount');
    const selectAllEl = document.getElementById('selectAll');

    function numberFrom(el) {
      return Number((el?.textContent || '0').replace(/[^0-9]/g, '')) || 0;
    }

    function normalizeQty(input) {
      const qty = parseInt(input.value || '1', 10);
      input.value = String(Number.isFinite(qty) && qty > 0 ? qty : 1);
      return Number(input.value);
    }

    function isRowSelected(row) {
      const checkbox = row.querySelector('.select-input');
      return !checkbox || checkbox.checked;
    }

    function recalc() {
      let subtotal = 0;
      let selectedCount = 0;

      rows.forEach(row => {
        const unitPrice = Number(row.dataset.unitPrice) || 0;
        const qtyInput = row.querySelector('.qty-input');
        const qty = normalizeQty(qtyInput);
        const lineTotal = unitPrice * qty;
        const selected = isRowSelected(row);

        if (selected) {
          subtotal += lineTotal;
          selectedCount++;
        }
        // 해제된 행은 흐리게 + 수량 잠금 (disabled는 폼 전송에서 빠지므로 readonly 사용)
        row.classList.toggle('unselected', !selected);
        if (qtyInput) qtyInput.readOnly = !selected;

        const lineEl = row.querySelector('.line-total');
        if (lineEl) lineEl.textContent = fmt.format(lineTotal);
      });

      const deliveryFee = numberFrom(deliveryEl);
      const discount = numberFrom(discountEl);
      const paymentTotal = Math.max(0, subtotal + deliveryFee - discount);

      if (subtotalEl) subtotalEl.textContent = fmt.format(subtotal);
      if (totalEl) totalEl.textContent = fmt.format(paymentTotal);
      if (countEl) countEl.textContent = String(selectedCount);
      if (selectAllEl) selectAllEl.checked = rows.length > 0 && rows.every(isRowSelected);
    }

    rows.forEach(row => {
      row.querySelector('.qty-input')?.addEventListener('input', recalc);
      row.querySelector('.qty-input')?.addEventListener('change', recalc);
      row.querySelector('.select-input')?.addEventListener('change', recalc);
    });

    selectAllEl?.addEventListener('change', () => {
      rows.forEach(row => {
        const checkbox = row.querySelector('.select-input');
        if (checkbox) checkbox.checked = selectAllEl.checked;
      });
      recalc();
    });

    recalc();
  })();

  //# sourceURL=/html/orderdetail.js
</script>

</body>
</html>
