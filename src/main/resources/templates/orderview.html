<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>주문 상세</title>
  <style>
    :root{
      --bg1:#fff7ed; --bg2:#fde7d8; --bg3:#fae8ff;
      --card:#fffaf5; --ink:#443c33; --muted:#7a6f66;
      --accent1:#f4a261; --accent2:#e76f51;
      --line:#eadfd6; --danger:#e5484d; --ok:#2f9e62;
      --radius:18px; --shadow:0 20px 45px rgba(68,60,51,.18);
    }
    *{box-sizing:border-box}
    body{margin:0; color:var(--ink); min-height:100vh; padding:24px;
         font-family:ui-sans-serif, system-ui, -apple-system,"Segoe UI",Roboto,"Noto Sans KR",Arial,"Apple SD Gothic Neo";
         background:
            radial-gradient(1200px 700px at 80% 10%, var(--bg3) 0%, transparent 60%),
            radial-gradient(900px 600px at 10% 90%, var(--bg2) 0%, transparent 60%),
            linear-gradient(180deg, var(--bg1), #fff);
         background-repeat:no-repeat; background-attachment:fixed;}
    .wrap{max-width:760px; margin:16px auto; padding:0 16px;}
    .panel{background:var(--card); border-radius:var(--radius);
           box-shadow:var(--shadow); padding:24px 26px;}
    .block{padding:6px 2px 16px; margin-bottom:16px; border-bottom:1px solid var(--line);}
    .phead{display:flex; align-items:center; gap:12px; margin-bottom:18px;
           padding-bottom:14px; border-bottom:1px dashed #efdfd2;}
    .logo{width:44px; height:44px; border-radius:14px; flex:none; display:grid; place-items:center;
          background:conic-gradient(from 210deg,#ffd7ba,#f7b267,#e76f51,#ffd7ba);
          color:#fff; font-weight:800; letter-spacing:.4px; box-shadow:0 10px 20px rgba(231,111,81,.28);}
    .hint{font-size:12px; color:var(--muted);}
    h1{font-size:22px; letter-spacing:-.2px; margin:0;}
    .flash{border-radius:12px; padding:12px 14px; margin-bottom:14px; font-size:14px;}
    .flash.ok{background:#e8f6ee; color:var(--ok); border:1px solid #c4e8d3;}
    .flash.err{background:#fdecec; color:var(--danger); border:1px solid #f5c6c8;}
    .meta{display:grid; grid-template-columns:120px 1fr; row-gap:10px; font-size:14px;}
    .meta dt{color:var(--muted);}
    .meta dd{margin:0;}
    .badge{display:inline-block; padding:4px 12px; border-radius:999px; font-size:12px; font-weight:600;}
    .badge.order{background:#fff0e6; color:var(--accent2);}
    .badge.cancel{background:#fdecec; color:var(--danger);}
    .badge.backorder{background:#fff4e0; color:#a4690f;}
    table{width:100%; border-collapse:collapse; font-size:14px;}
    th,td{padding:10px 8px; border-bottom:1px solid var(--line); text-align:left;}
    th{color:var(--muted); font-weight:600;}
    td.num, th.num{text-align:right;}
    .total{display:flex; justify-content:flex-end; gap:14px; padding:14px 8px 2px;
           font-size:15px; font-weight:700;}
    .actions{display:flex; justify-content:space-between; align-items:center; margin-top:6px;}
    .btn{appearance:none; display:inline-block; border:0; cursor:pointer; text-decoration:none;
         padding:10px 18px; border-radius:12px; color:#fff; font-weight:700; font-size:14px;
         background:linear-gradient(135deg,var(--accent1),var(--accent2));
         box-shadow:0 10px 20px rgba(231,111,81,.3), 0 2px 6px rgba(0,0,0,.06);
         transition:transform .05s ease, filter .2s ease;}
    .btn:hover{filter:saturate(1.05) brightness(1.02)}
    .btn:active{transform:translateY(1px)}
    .btn.muted{background:linear-gradient(135deg,#b8b8b8,#7d7d7d)}
    .btn.danger{background:linear-gradient(135deg,#ef6f6f,#e5484d)}
  </style>
</head>
<body>
<div class="wrap">
 <div class="panel">
  <div class="phead">
    <div class="logo">GM</div>
    <div>
      <h1>주문 상세</h1>
      <div class="hint">주문 내역과 배송 상태를 확인할 수 있습니다.</div>
    </div>
  </div>

  <div class="flash ok" th:if="${successMessage}" th:text="${successMessage}">완료 메시지</div>
  <div class="flash err" th:if="${errorMessage}" th:text="${errorMessage}">에러 메시지</div>

  <div class="block">
    <dl class="meta">
      <dt>주문번호</dt><dd th:text="${order.id}">101</dd>
      <dt>주문상태</dt>
      <dd>
        <span class="badge"
              th:classappend="${order.status.name() == 'CANCEL'} ? 'cancel' : (${order.status.name() == 'BACKORDERED'} ? 'backorder' : 'order')"
              th:text="${order.status}">ORDER</span>
        <span class="badge backorder" th:if="${order.status.name() == 'BACKORDERED'}">입고 대기 — 입고 후 출고됩니다</span>
      </dd>
      <dt>주문일시</dt><dd th:text="${#temporals.format(order.orderDate,'yyyy-MM-dd HH:mm')}">2026-06-12 10:22</dd>
      <dt>배송상태</dt><dd th:text="${order.deliveryStatus}">READY</dd>
      <dt>배송지</dt><dd th:text="|${order.city} ${order.street} (${order.zipcode})|">서울 관악구 (500)</dd>
    </dl>
  </div>

  <div class="block">
    <table>
      <thead>
      <tr>
        <th>상품명</th>
        <th class="num">단가</th>
        <th class="num">수량</th>
        <th class="num">합계</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="item : ${order.items}">
        <td th:text="${item.productName}">상품1</td>
        <td class="num"><span th:text="${#numbers.formatInteger(item.orderPrice,3,'COMMA')}">10,000</span>원</td>
        <td class="num" th:text="${item.count}">2</td>
        <td class="num"><span th:text="${#numbers.formatInteger(item.totalPrice,3,'COMMA')}">20,000</span>원</td>
      </tr>
      </tbody>
    </table>
    <div class="total">
      <span>총 결제금액</span>
      <span><span th:text="${#numbers.formatInteger(order.totalPrice,3,'COMMA')}">20,000</span>원</span>
    </div>
  </div>

  <div class="actions">
    <a class="btn muted" th:href="@{/main}">메인으로</a>
    <form th:if="${order.cancelable}" th:action="@{|/orders/${order.id}/cancel|}" method="post"
          onsubmit="return confirm('이 주문을 취소하시겠습니까? 재고가 복구됩니다.');">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button class="btn danger" type="submit">주문 취소</button>
    </form>
  </div>
 </div>
</div>
</body>
</html>
