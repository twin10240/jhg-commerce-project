<!-- templates/admin/purchaseorders.html : 관리자 발주/입고 관리 -->
<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>발주 관리</title>

  <style>
    :root{
      --bg1:#fff7ed; --bg2:#fde7d8; --bg3:#fae8ff;
      --card:#fffaf5; --ink:#443c33; --muted:#7a6f66;
      --accent1:#f4a261; --accent2:#e76f51;
      --ring:rgba(244,162,97,.35);
      --radius:18px; --shadow:0 20px 45px rgba(68,60,51,.18);
    }
    *{box-sizing:border-box}
    html{height:100%}
    body{
      min-height:100%;
      margin:0; color:var(--ink);
      font-family:ui-sans-serif, system-ui, -apple-system,"Segoe UI",Roboto,"Noto Sans KR",Arial,"Apple SD Gothic Neo";
      background:
              radial-gradient(1200px 700px at 80% 10%, var(--bg3) 0%, transparent 60%),
              radial-gradient(900px 600px at 10% 90%, var(--bg2) 0%, transparent 60%),
              linear-gradient(180deg, var(--bg1), #fff);
      background-repeat:no-repeat;
      background-attachment:fixed;
      padding:24px;
    }
    .container{max-width:1080px; margin:0 auto}

    .page-head{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:14px}
    .page-title{font-size:24px; font-weight:800; letter-spacing:-.2px}
    .page-desc{color:var(--muted); font-size:13px; margin-top:4px}

    .card{
      background:var(--card); border-radius:var(--radius);
      box-shadow:var(--shadow); padding:20px 18px;
      animation:fade .3s ease;
    }
    @keyframes fade{from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:translateY(0)}}

    .btn{
      appearance:none; border:0; cursor:pointer;
      padding:10px 14px; border-radius:12px; color:white; font-weight:700;
      background:linear-gradient(135deg, var(--accent1), var(--accent2));
      box-shadow:0 10px 20px rgba(231,111,81,.3), 0 2px 6px rgba(0,0,0,.06);
      text-decoration:none; font-size:14px;
    }
    .btn.outline{background:#fff; color:#6e6259; border:1px solid #eadfd6; box-shadow:none}
    .btn.sm{padding:6px 12px; font-size:13px; box-shadow:0 2px 6px rgba(0,0,0,.08)}

    label.field-label{display:block; font-size:12px; color:var(--muted); margin-bottom:4px}
    .input{width:100%; padding:10px 12px; border-radius:12px; border:1px solid #e8ded5; background:#fff; color:var(--ink); font-size:14px}
    .input:focus{outline:none; border-color:var(--accent1); box-shadow:0 0 0 3px var(--ring)}
    .create-grid{display:grid; grid-template-columns:2fr 1fr 1.4fr auto; gap:10px; align-items:end}

    .flash{margin-bottom:14px; padding:12px 16px; border-radius:10px; font-size:14px}
    .flash.success{border:1px solid #b7d9b0; color:#2e7d32; background:#f1f8ef}
    .flash.error{border:1px solid #e3b4ac; color:#c0392b; background:#fdf3f1}

    table{width:100%; border-collapse:separate; border-spacing:0 8px}
    th,td{padding:10px 12px; text-align:left; font-size:14px}
    thead th{color:#7a6f66; font-weight:700}
    tbody tr{background:var(--card); border:1px solid #eadfd6; border-radius:12px}
    tbody tr td:first-child{border-top-left-radius:12px; border-bottom-left-radius:12px}
    tbody tr td:last-child{border-top-right-radius:12px; border-bottom-right-radius:12px}
    .hint{color:var(--muted); font-size:12px}

    .status-badge{
      display:inline-block; padding:3px 10px; border-radius:999px;
      font-size:12px; font-weight:800;
    }
    .status-badge.ordered{color:#8a6d3b; background:#fcf6e8; border:1px solid #e7d3a1}
    .status-badge.received{color:#2e7d32; background:#f1f8ef; border:1px solid #b7d9b0}

    @media (prefers-color-scheme: dark){
      body{background:linear-gradient(180deg,#1b1917,#26211d); background-attachment:fixed}
      .card{background:#201d1a; color:#f1eee9}
      thead th{color:#bfb4a9}
      tbody tr{background:#161412; border-color:#39322c}
      .btn.outline{background:#161412; border-color:#39322c; color:#d9d4cf}
      .input{background:#161412; border-color:#39322c; color:#f1eee9}
    }
  </style>
</head>
<body>
<div class="container">
  <div class="page-head">
    <div>
      <div class="page-title">발주 관리</div>
      <div class="page-desc">재고 보충을 위한 발주를 생성하고, 입고 처리합니다.</div>
    </div>
    <div style="display:flex; gap:8px;">
      <a class="btn outline" th:href="@{/admin/inventory}">재고 관리</a>
      <a class="btn outline" th:href="@{/admin/orders}">배송 관리</a>
      <a class="btn outline" th:href="@{/main}">메인으로</a>
    </div>
  </div>

  <div class="flash success" th:if="${successMessage}" th:text="${successMessage}"></div>
  <div class="flash error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

  <!-- 발주 생성 -->
  <div class="card">
    <h2 style="margin:4px 0 12px; font-size:18px;">발주 생성</h2>
    <form th:action="@{/admin/purchase-orders}" method="post" class="create-grid">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <div>
        <label class="field-label">상품</label>
        <select name="items[0].productId" class="input">
          <option th:each="p : ${products}" th:value="${p.productId}" th:text="${p.productId}">1</option>
        </select>
      </div>
      <div>
        <label class="field-label">수량</label>
        <input class="input" type="number" name="items[0].quantity" min="1" value="10" />
      </div>
      <div>
        <label class="field-label">메모</label>
        <input class="input" type="text" name="memo" placeholder="긴급 발주 등" />
      </div>
      <button class="btn" type="submit">발주 생성</button>
    </form>
  </div>

  <!-- 발주 현황 -->
  <div class="card" style="margin-top:16px">
    <h2 style="margin:4px 0 12px; font-size:18px;">발주 현황</h2>
    <table>
      <thead>
      <tr>
        <th style="width:90px">발주번호</th>
        <th style="width:110px">상태</th>
        <th>품목</th>
        <th>메모</th>
        <th style="width:150px">발주일시</th>
        <th style="width:90px">입고</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="po : ${purchaseOrders}">
        <td th:text="${po.id}">1</td>
        <td>
          <span class="status-badge" th:classappend="${po.status == 'RECEIVED'} ? 'received' : 'ordered'"
                th:text="${po.status == 'RECEIVED'} ? '입고완료' : '입고대기'">입고대기</span>
        </td>
        <td>
          <span th:each="item, stat : ${po.items}">
            <span th:text="|상품#${item.productId} x${item.quantity}|">상품#1 x10</span><span th:if="${!stat.last}">, </span>
          </span>
        </td>
        <td class="hint" th:text="${po.memo}">긴급 발주</td>
        <td class="hint" th:text="${#temporals.format(po.createdAt,'yyyy-MM-dd HH:mm')}">2026-06-11 10:00</td>
        <td>
          <!-- 입고대기 건만 행에서 바로 입고 처리 -->
          <form th:if="${po.status != 'RECEIVED'}" th:action="@{/admin/purchase-orders/receive}" method="post" style="margin:0;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <input type="hidden" name="poId" th:value="${po.id}" />
            <button class="btn sm" type="submit">입고</button>
          </form>
          <span th:if="${po.status == 'RECEIVED'}" class="hint">—</span>
        </td>
      </tr>
      <tr th:if="${#lists.isEmpty(purchaseOrders)}">
        <td colspan="6" class="hint">발주 내역이 없습니다. 위에서 발주를 생성하세요.</td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
