<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>재고 관리</title>
  <style>
    :root{--bg1:#fff7ed;--bg2:#fde7d8;--bg3:#fae8ff;--card:#fffaf5;--ink:#443c33;--muted:#7a6f66;--accent1:#f4a261;--accent2:#e76f51;--radius:18px;--shadow:0 20px 45px rgba(68,60,51,.18)}
    *{box-sizing:border-box}
    body{min-height:100vh;margin:0;padding:24px;color:var(--ink);font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans KR",Arial;background:radial-gradient(1200px 700px at 80% 10%,var(--bg3) 0%,transparent 60%),radial-gradient(900px 600px at 10% 90%,var(--bg2) 0%,transparent 60%),linear-gradient(180deg,var(--bg1),#fff);background-attachment:fixed}
    .container{max-width:1080px;margin:auto}
    .page-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
    .page-title{color:var(--accent2);font-size:24px;font-weight:800}.page-desc{color:#6e6259;font-size:13px;font-weight:600;margin-top:4px}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .btn{padding:10px 14px;border-radius:12px;color:#fff;font-weight:700;background:linear-gradient(135deg,var(--accent1),var(--accent2));box-shadow:0 10px 20px rgba(231,111,81,.3);text-decoration:none;font-size:14px}
    .btn.outline{background:#fff;color:#6e6259;border:1px solid #eadfd6;box-shadow:none}
    .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 18px}
    table{width:100%;border-collapse:separate;border-spacing:0 8px}th,td{padding:10px 12px;text-align:left;font-size:14px}thead th{color:var(--muted);font-weight:700}
    tbody tr{background:var(--card);border:1px solid #eadfd6}tbody tr td:first-child{border-radius:12px 0 0 12px}tbody tr td:last-child{border-radius:0 12px 12px 0}.hint{color:var(--muted);font-size:12px}
    @media(max-width:640px){.page-head{align-items:flex-start;flex-direction:column}.card{overflow-x:auto}}
    @media(prefers-color-scheme:dark){body{background:linear-gradient(180deg,#1b1917,#26211d);background-attachment:fixed}.page-title{color:var(--accent1)}.page-desc{color:#d9d4cf}.card{background:#201d1a;color:#f1eee9}thead th{color:#bfb4a9}tbody tr{background:#161412;border-color:#39322c}.btn.outline{background:#161412;border-color:#39322c;color:#d9d4cf}}
  </style>
</head>
<body>
<div class="container">
  <div class="page-head">
    <div>
      <div class="page-title">재고 관리</div>
      <div class="page-desc">WMS가 관리하는 현재 상품별 보유 재고입니다.</div>
    </div>
    <div class="actions">
      <a class="btn outline" th:href="@{/admin/replenishment-requests}">재고 보충 요청</a>
      <a class="btn outline" th:href="@{/main}">메인으로</a>
    </div>
  </div>
  <div class="card">
    <table>
      <thead><tr><th>상품 ID</th><th>상품명</th><th>보유 수량</th></tr></thead>
      <tbody>
        <tr th:each="product : ${products}"><td th:text="${product.productId}">1</td><td th:text="${product.productName}">상품 1</td><td th:text="${product.onHandQty}">15</td></tr>
        <tr th:if="${#lists.isEmpty(products)}"><td colspan="3" class="hint">등록된 상품이 없습니다.</td></tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
