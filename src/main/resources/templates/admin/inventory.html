<!-- templates/admin/inventory.html : 관리자 재고 조회 -->
<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>재고 관리</title>

  <style>
    :root{
      --bg1:#fff7ed; --bg2:#fde7d8; --bg3:#fae8ff;
      --card:#fffaf5; --ink:#443c33; --muted:#7a6f66;
      --accent1:#f4a261; --accent2:#e76f51;
      --ring:rgba(244,162,97,.35);
      --radius:18px; --shadow:0 20px 45px rgba(68,60,51,.18);
    }
    *{box-sizing:border-box}
    html{height:100%}
    body{
      min-height:100%;
      margin:0; color:var(--ink);
      font-family:ui-sans-serif, system-ui, -apple-system,"Segoe UI",Roboto,"Noto Sans KR",Arial,"Apple SD Gothic Neo";
      background:
              radial-gradient(1200px 700px at 80% 10%, var(--bg3) 0%, transparent 60%),
              radial-gradient(900px 600px at 10% 90%, var(--bg2) 0%, transparent 60%),
              linear-gradient(180deg, var(--bg1), #fff);
      background-repeat:no-repeat;
      background-attachment:fixed;
      padding:24px;
    }
    .container{max-width:1080px; margin:0 auto}

    .page-head{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:14px}
    .page-title{font-size:24px; font-weight:800; letter-spacing:-.2px}
    .page-desc{color:var(--muted); font-size:13px; margin-top:4px}

    .card{
      background:var(--card); border-radius:var(--radius);
      box-shadow:var(--shadow); padding:20px 18px;
      animation:fade .3s ease;
    }
    @keyframes fade{from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:translateY(0)}}

    .btn{
      appearance:none; border:0; cursor:pointer;
      padding:10px 14px; border-radius:12px; color:white; font-weight:700;
      background:linear-gradient(135deg, var(--accent1), var(--accent2));
      box-shadow:0 10px 20px rgba(231,111,81,.3), 0 2px 6px rgba(0,0,0,.06);
      text-decoration:none; font-size:14px;
    }
    .btn.outline{background:#fff; color:#6e6259; border:1px solid #eadfd6; box-shadow:none}

    .field{display:flex; flex-direction:column; gap:6px}
    label.field-label{font-size:13px; font-weight:700; color:var(--ink); letter-spacing:-.1px}
    .input{width:100%; padding:10px 12px; border-radius:12px; border:1px solid #e0d3c6; background:#fff; color:var(--ink); font-size:14px}
    .input:focus{outline:none; border-color:var(--accent1); box-shadow:0 0 0 3px var(--ring)}
    .adjust-grid{display:grid; grid-template-columns:2fr 1fr 1.4fr auto; gap:14px; align-items:end}
    /* 조정 도구: 스크롤해도 상단에 고정 + 배경보다 밝게 + 테두리로 구분 */
    .sticky-tool{
      position:sticky; top:12px; z-index:5; margin-bottom:16px;
      background:#ffffff; border:1.5px solid var(--accent1);
    }

    .flash{
      margin-bottom:14px; padding:12px 16px; border-radius:10px; font-size:14px;
    }
    .flash.success{border:1px solid #b7d9b0; color:#2e7d32; background:#f1f8ef}
    .flash.error{border:1px solid #e3b4ac; color:#c0392b; background:#fdf3f1}

    table{width:100%; border-collapse:separate; border-spacing:0 8px}
    th,td{padding:10px 12px; text-align:left; font-size:14px}
    thead th{color:#7a6f66; font-weight:700}
    tbody tr{background:var(--card); border:1px solid #eadfd6; border-radius:12px}
    tbody tr td:first-child{border-top-left-radius:12px; border-bottom-left-radius:12px}
    tbody tr td:last-child{border-top-right-radius:12px; border-bottom-right-radius:12px}
    .right{text-align:right}
    .qty-zero{color:#c0392b; font-weight:800}
    .hint{color:var(--muted); font-size:12px}

    .status-badge{
      display:inline-block; padding:3px 10px; border-radius:999px;
      font-size:12px; font-weight:800;
    }
    .status-badge.ordered{color:#8a6d3b; background:#fcf6e8; border:1px solid #e7d3a1}
    .status-badge.received{color:#2e7d32; background:#f1f8ef; border:1px solid #b7d9b0}

    @media (prefers-color-scheme: dark){
      body{background:linear-gradient(180deg,#1b1917,#26211d); background-attachment:fixed}
      .card{background:#201d1a; color:#f1eee9}
      thead th{color:#bfb4a9}
      tbody tr{background:#161412; border-color:#39322c}
      .btn.outline{background:#161412; border-color:#39322c; color:#d9d4cf}
    }
  </style>
</head>
<body>
<div class="container">
  <div class="page-head">
    <div>
      <div class="page-title">재고 관리</div>
      <div class="page-desc">전체 상품의 현재 보유 수량을 확인하고, 실사·파손 등으로 인한 수량 보정을 합니다.</div>
    </div>
    <div style="display:flex; gap:8px;">
      <a class="btn outline" th:href="@{/admin/purchase-orders}">발주 관리</a>
      <a class="btn outline" th:href="@{/admin/orders}">배송 관리</a>
      <a class="btn outline" th:href="@{/main}">메인으로</a>
    </div>
  </div>

  <div class="flash success" th:if="${successMessage}" th:text="${successMessage}"></div>
  <div class="flash error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

  <div class="card sticky-tool">
    <h2 style="margin:4px 0 4px; font-size:18px;">재고 수동 조정</h2>
    <div class="page-desc" style="margin-bottom:14px;">재고 부족 보충은 <a th:href="@{/admin/purchase-orders}">발주 관리</a>에서 하세요. 여기는 실사·파손 등 보정용입니다.</div>
    <form th:action="@{/admin/inventory/adjust}" method="post" class="adjust-grid">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <div class="field">
        <label class="field-label">상품</label>
        <select name="productId" class="input">
          <option th:each="p : ${products}" th:value="${p.productId}" th:text="${p.productId}">1</option>
        </select>
      </div>
      <div class="field">
        <label class="field-label">증감 수량 (+/−)</label>
        <input class="input" type="number" name="delta" step="1" value="-1" />
      </div>
      <div class="field">
        <label class="field-label">사유</label>
        <input class="input" type="text" name="reason" placeholder="정기실사 / 파손 / 분실 등" />
      </div>
      <button class="btn" type="submit">조정</button>
    </form>
  </div>

  <div class="card">
    <table>
      <thead>
      <tr>
        <th style="width:120px">상품 ID</th>
        <th class="right">보유 수량</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="p : ${products}">
        <td th:text="${p.productId}">1</td>
        <td class="right">
          <span th:text="${p.onHandQty}" th:classappend="${p.onHandQty == 0} ? 'qty-zero'">15</span>개
        </td>
      </tr>
      <tr th:if="${#lists.isEmpty(products)}">
        <td colspan="2" class="hint">등록된 상품이 없습니다.</td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
