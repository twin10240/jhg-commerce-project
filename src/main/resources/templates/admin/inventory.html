<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>재고 및 보충 요청</title>
  <style>
    body{font-family:system-ui,sans-serif;margin:0;padding:24px;background:#fff7ed;color:#443c33}
    main{max-width:1080px;margin:auto} section{background:#fff;padding:18px;margin:16px 0;border-radius:12px}
    form{display:flex;gap:10px;align-items:end;flex-wrap:wrap} label{display:grid;gap:4px}
    input,select,button{padding:8px} table{width:100%;border-collapse:collapse} th,td{padding:8px;border-bottom:1px solid #ddd;text-align:left}
    .success{color:#2e7d32}.error{color:#c0392b}
  </style>
</head>
<body>
<main>
  <h1>재고 및 보충 요청</h1>
  <a th:href="@{/main}">메인으로</a>
  <p class="success" th:if="${successMessage}" th:text="${successMessage}"></p>
  <p class="error" th:if="${errorMessage}" th:text="${errorMessage}"></p>

  <section>
    <h2>보충 요청</h2>
    <form th:action="@{/admin/replenishment-requests}" th:object="${requestForm}" method="post">
      <input type="hidden" th:field="*{requestKey}" />
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <label>상품
        <select th:field="*{items[0].productId}" required>
          <option value="">선택</option>
          <option th:each="product : ${products}" th:value="${product.productId}" th:text="${product.productId}">1</option>
        </select>
      </label>
      <label>수량 <input type="number" min="1" th:field="*{items[0].requestedQty}" required /></label>
      <label>사유 <input type="text" th:field="*{reason}" required /></label>
      <button type="submit">요청</button>
    </form>
  </section>

  <section>
    <h2>현재 재고</h2>
    <table>
      <thead><tr><th>상품 ID</th><th>보유 수량</th></tr></thead>
      <tbody>
        <tr th:each="product : ${products}"><td th:text="${product.productId}">1</td><td th:text="${product.onHandQty}">15</td></tr>
        <tr th:if="${#lists.isEmpty(products)}"><td colspan="2">등록된 상품이 없습니다.</td></tr>
      </tbody>
    </table>
  </section>

  <section>
    <h2>보충 요청 이력</h2>
    <table>
      <thead><tr><th>번호</th><th>품목</th><th>사유</th><th>상태</th><th>요청</th><th>결정</th><th>완료</th><th>메모</th><th>PO</th></tr></thead>
      <tbody>
        <tr th:each="request : ${requests}">
          <td th:text="${request.id}">1</td>
          <td><span th:each="item, stat : ${request.items}"><span th:text="|상품#${item.productId} x${item.requestedQty}|">상품#1 x3</span><span th:if="${!stat.last}">, </span></span></td>
          <td th:text="${request.reason}">low stock</td>
          <td th:text="${request.status}">REQUESTED</td>
          <td th:text="${request.requestedAt}">2026-07-16</td>
          <td th:text="${request.decidedAt ?: '-'}">-</td>
          <td th:text="${request.fulfilledAt ?: '-'}">-</td>
          <td th:text="${request.wmsMemo ?: '-'}">-</td>
          <td th:text="${request.purchaseOrderId ?: '-'}">-</td>
        </tr>
        <tr th:if="${#lists.isEmpty(requests)}"><td colspan="9">보충 요청이 없습니다.</td></tr>
      </tbody>
    </table>
  </section>
</main>
</body>
</html>
