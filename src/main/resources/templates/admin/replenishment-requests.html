<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>재고 보충 요청</title>
  <style>
    :root{--bg1:#fff7ed;--bg2:#fde7d8;--bg3:#fae8ff;--card:#fffaf5;--ink:#443c33;--muted:#7a6f66;--accent1:#f4a261;--accent2:#e76f51;--radius:18px;--shadow:0 20px 45px rgba(68,60,51,.18)}
    *{box-sizing:border-box}
    body{min-height:100vh;margin:0;padding:24px;color:var(--ink);font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans KR",Arial;background:radial-gradient(1200px 700px at 80% 10%,var(--bg3) 0%,transparent 60%),radial-gradient(900px 600px at 10% 90%,var(--bg2) 0%,transparent 60%),linear-gradient(180deg,var(--bg1),#fff);background-attachment:fixed}
    .container{max-width:1080px;margin:auto}.page-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}.page-title{color:var(--accent2);font-size:24px;font-weight:800}.page-desc{color:#6e6259;font-size:13px;font-weight:600;margin-top:4px}.actions{display:flex;gap:8px;flex-wrap:wrap}
    .btn{appearance:none;border:0;cursor:pointer;padding:10px 14px;border-radius:12px;color:#fff;font-weight:700;background:linear-gradient(135deg,var(--accent1),var(--accent2));box-shadow:0 10px 20px rgba(231,111,81,.3);text-decoration:none;font-size:14px}.btn.outline{background:#fff;color:#6e6259;border:1px solid #eadfd6;box-shadow:none}
    .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 18px;margin-bottom:16px}.card h2{margin:0 0 14px;font-size:18px}
    form{display:flex;gap:10px;align-items:end;flex-wrap:wrap}label{display:grid;gap:5px;color:var(--muted);font-size:13px;font-weight:700}input,select{min-width:150px;padding:10px 12px;border:1px solid #eadfd6;border-radius:10px;background:#fff;color:var(--ink)}
    .flash{margin-bottom:14px;padding:12px 16px;border-radius:10px;font-size:14px}.flash.success{border:1px solid #b7d9b0;color:#2e7d32;background:#f1f8ef}.flash.error{border:1px solid #e3b4ac;color:#c0392b;background:#fdf3f1}
    table{width:100%;border-collapse:separate;border-spacing:0 8px}th,td{padding:10px 12px;text-align:left;font-size:14px}thead th{color:var(--muted);font-weight:700}tbody tr{background:var(--card);border:1px solid #eadfd6}tbody tr td:first-child{border-radius:12px 0 0 12px}tbody tr td:last-child{border-radius:0 12px 12px 0}.hint{color:var(--muted);font-size:12px}
    @media(max-width:640px){.page-head{align-items:flex-start;flex-direction:column}.card{overflow-x:auto}input,select{min-width:0;width:100%}form,label{width:100%}}
    @media(prefers-color-scheme:dark){body{background:linear-gradient(180deg,#1b1917,#26211d);background-attachment:fixed}.page-title{color:var(--accent1)}.page-desc{color:#d9d4cf}.card{background:#201d1a;color:#f1eee9}input,select{background:#161412;border-color:#39322c;color:#f1eee9}thead th{color:#bfb4a9}tbody tr{background:#161412;border-color:#39322c}.btn.outline{background:#161412;border-color:#39322c;color:#d9d4cf}}
  </style>
</head>
<body>
<div class="container">
  <div class="page-head">
    <div>
      <div class="page-title">재고 보충 요청</div>
      <div class="page-desc">필요한 재고를 WMS에 요청하고 처리 상태를 확인합니다.</div>
    </div>
    <div class="actions">
      <a class="btn outline" th:href="@{/admin/inventory}">재고 관리</a>
      <a class="btn outline" th:href="@{/main}">메인으로</a>
    </div>
  </div>
  <div class="flash success" th:if="${successMessage}" th:text="${successMessage}"></div>
  <div class="flash error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

  <div class="card">
    <h2>새 요청</h2>
    <form th:action="@{/admin/replenishment-requests}" th:object="${requestForm}" method="post">
      <input type="hidden" th:field="*{requestKey}" />
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <label>상품
        <select th:field="*{items[0].productId}" required>
          <option value="">선택</option>
          <option th:each="product : ${products}" th:value="${product.productId}" th:text="${product.productId}">1</option>
        </select>
      </label>
      <label>수량 <input type="number" min="1" th:field="*{items[0].requestedQty}" required /></label>
      <label>사유 <input type="text" th:field="*{reason}" required /></label>
      <button class="btn" type="submit">요청</button>
    </form>
  </div>

  <div class="card">
    <h2>요청 이력</h2>
    <table>
      <thead><tr><th>번호</th><th>품목</th><th>사유</th><th>상태</th><th>요청</th><th>결정</th><th>완료</th><th>메모</th><th>PO</th></tr></thead>
      <tbody>
        <tr th:each="request : ${requests}">
          <td th:text="${request.id}">1</td>
          <td><span th:each="item, stat : ${request.items}"><span th:text="|상품#${item.productId} x${item.requestedQty}|">상품#1 x3</span><span th:if="${!stat.last}">, </span></span></td>
          <td th:text="${request.reason}">low stock</td>
          <td th:text="${request.status}">REQUESTED</td>
          <td th:text="${request.requestedAt}">2026-07-16</td>
          <td th:text="${request.decidedAt ?: '-'}">-</td>
          <td th:text="${request.fulfilledAt ?: '-'}">-</td>
          <td th:text="${request.wmsMemo ?: '-'}">-</td>
          <td th:text="${request.purchaseOrderId ?: '-'}">-</td>
        </tr>
        <tr th:if="${#lists.isEmpty(requests)}"><td colspan="9" class="hint">재고 보충 요청이 없습니다.</td></tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
