<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오류</title>
    <style>
        body{font-family:'Segoe UI', sans-serif; background:#faf7f2; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0;}
        .card{background:#fff; border:1px solid #eee; border-radius:14px; padding:40px 48px; text-align:center; box-shadow:0 6px 18px rgba(0,0,0,.06); max-width:480px;}
        h1{margin:0 0 8px; font-size:42px; color:#c0392b;}
        .reason{color:#888; margin:0 0 16px; font-size:14px;}
        .message{color:#444; margin:0 0 28px;}
        a.btn{display:inline-block; padding:10px 22px; border-radius:10px; background:#2d6a4f; color:#fff; text-decoration:none;}
    </style>
</head>
<body>
<div class="card">
    <h1 th:text="${status} ?: '오류'">오류</h1>
    <p class="reason" th:if="${error}" th:text="${error}"></p>
    <p class="message" th:text="${message} ?: '요청을 처리하는 중 문제가 발생했습니다.'">요청을 처리하는 중 문제가 발생했습니다.</p>
    <a class="btn" href="/main">메인으로 돌아가기</a>
</div>
</body>
</html>
